version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ipmp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    restart: unless-stopped

volumes:
  mongodb_data:
